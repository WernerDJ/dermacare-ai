services:
  db:
    image: postgres:15-alpine
    container_name: dermacare_db
    restart: always
    environment:
      POSTGRES_DB: dermacare_db
      POSTGRES_USER: dermacare_user
      POSTGRES_PASSWORD: dermacare_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_volume:/var/lib/postgresql/data
    networks:
      - dermacare_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dermacare_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dermacare_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - dermacare_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile_backend
    container_name: dermacare_backend
    restart: always
    command: gunicorn dermacare.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      SECRET_KEY: "your-secret-key-here"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend,13.63.115.141"
      DB_ENGINE: "django.db.backends.postgresql"
      DB_NAME: "dermacare_db"
      DB_USER: "dermacare_user"
      DB_PASSWORD: "dermacare_pass"
      DB_HOST: "db"
      DB_PORT: "5432"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      INCI_API: "${INCI_API}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_volume:/app/uploads
    networks:
      - dermacare_network

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile_backend
    container_name: dermacare_celery
    restart: always
    command: celery -A dermacare worker -l info
    environment:
      DEBUG: "False"
      SECRET_KEY: "your-secret-key-here"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend,13.63.115.141"
      DB_ENGINE: "django.db.backends.postgresql"
      DB_NAME: "dermacare_db"
      DB_USER: "dermacare_user"
      DB_PASSWORD: "dermacare_pass"
      DB_HOST: "db"
      DB_PORT: "5432"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      INCI_API: "${INCI_API}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_volume:/app/uploads
    networks:
      - dermacare_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile_frontend
    container_name: dermacare_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
      - REACT_APP_DEBUG=${DEBUG:-false}
    depends_on:
      - backend
    networks:
      - dermacare_network

  nginx:
    image: nginx:latest
    container_name: dermacare_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - dermacare_network

volumes:
  postgres_volume:
  uploads_volume:
  static_volume:
  media_volume:

networks:
  dermacare_network:
    driver: bridge